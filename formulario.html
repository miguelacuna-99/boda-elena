<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario - Boda Elena</title>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .formulario {
      display: grid;
      gap: 15px;
    }
    h1 {
      color: #333;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: #333;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      padding: 12px 24px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
    }
    button:hover {
      background-color: #555;
    }
    .countdown {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: center;
    }
    .countdown h2 {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .countdown-units {
      display: flex;
      justify-content: space-around;
      gap: 15px;
    }
    .countdown-unit {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .flip-card {
      width: 100%;
      aspect-ratio: 1;
      perspective: 1000px;
      position: relative;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
    }
    .flip-card-inner.flip {
      transform: rotateX(180deg);
    }
    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
    }
    .flip-card-front {
      color: white;
      z-index: 2;
    }
    .flip-card-back {
      color: white;
      transform: rotateX(180deg);
      display: none;
    }
    .countdown-label {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="countdown">
    <h2>La boda en:</h2>
    <div class="countdown-units">
      <div class="countdown-unit">
        <div class="flip-card">
          <div class="flip-card-inner" id="flip-days">
            <div class="flip-card-front"><span id="days">0</span></div>
            <div class="flip-card-back"><span id="days-next">1</span></div>
          </div>
        </div>
        <div class="countdown-label">Días</div>
      </div>
      <div class="countdown-unit">
        <div class="flip-card">
          <div class="flip-card-inner" id="flip-hours">
            <div class="flip-card-front"><span id="hours">0</span></div>
            <div class="flip-card-back"><span id="hours-next">1</span></div>
          </div>
        </div>
        <div class="countdown-label">Horas</div>
      </div>
      <div class="countdown-unit">
        <div class="flip-card">
          <div class="flip-card-inner" id="flip-minutes">
            <div class="flip-card-front"><span id="minutes">0</span></div>
            <div class="flip-card-back"><span id="minutes-next">1</span></div>
          </div>
        </div>
        <div class="countdown-label">Minutos</div>
      </div>
      <div class="countdown-unit">
        <div class="flip-card">
          <div class="flip-card-inner" id="flip-seconds">
            <div class="flip-card-front"><span id="seconds">0</span></div>
            <div class="flip-card-back"><span id="seconds-next">1</span></div>
          </div>
        </div>
        <div class="countdown-label">Segundos</div>
      </div>
    </div>
  </div>

  <form id="contactForm">

<p id="status"></p>

<script>
// Countdown timer with flip animation
function updateCountdown() {
  const now = new Date();
  const target = new Date('2026-09-26T00:00:00').getTime();
  const remaining = target - now.getTime();
  
  if (remaining <= 0) {
    updateFlipNumber('days', '0', '0');
    updateFlipNumber('hours', '0', '0');
    updateFlipNumber('minutes', '0', '0');
    updateFlipNumber('seconds', '0', '0');
    return;
  }
  
  const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
  const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
  
  const nextSeconds = (seconds + 1) % 60;
  
  updateFlipNumber('days', days.toString().padStart(2, '0'), ((days + 1) % 1000).toString().padStart(2, '0'));
  updateFlipNumber('hours', hours.toString().padStart(2, '0'), ((hours + 1) % 24).toString().padStart(2, '0'));
  updateFlipNumber('minutes', minutes.toString().padStart(2, '0'), ((minutes + 1) % 60).toString().padStart(2, '0'));
  updateFlipNumber('seconds', seconds.toString().padStart(2, '0'), nextSeconds.toString().padStart(2, '0'));
}

function updateFlipNumber(id, currentValue, nextValue) {
  const front = document.getElementById(id);
  const back = document.getElementById(id + '-next');
  const flipCard = document.getElementById('flip-' + id);
  
  if (front.textContent !== currentValue) {
    front.textContent = currentValue;
    back.textContent = nextValue;
    flipCard.classList.add('flip');
    
    setTimeout(() => {
      flipCard.classList.remove('flip');
    }, 600);
  }
}

// Update countdown immediately and then every second
updateCountdown();
setInterval(updateCountdown, 1000);

// Form submission handler
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    message: document.getElementById("message").value
  };

  const response = await fetch("https://api.github.com/repos/miguelacuna-99/boda-elena/actions/workflows/form.yml/dispatches", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer GITHUB_TOKEN_NO_AQUI"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: payload
    })
  });

  document.getElementById("status").innerText =
    response.ok ? "Mensaje enviado correctamente." : "Error al enviar.";
});
</script>


</html>
