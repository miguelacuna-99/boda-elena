<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario - Boda Elena</title>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .formulario {
      display: grid;
      gap: 15px;
    }
    h1 {
      color: #333;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: #333;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      padding: 12px 24px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
    }
    button:hover {
      background-color: #555;
    }
    .countdown {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: center;
    }
    .countdown h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .countdown-units {
      display: flex;
      justify-content: space-around;
      gap: 10px;
    }
    .countdown-unit {
      flex: 1;
    }
    .countdown-number {
      font-size: 36px;
      font-weight: bold;
      display: block;
    }
    .countdown-label {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="countdown">
    <h2>La boda en:</h2>
    <div class="countdown-units">
      <div class="countdown-unit">
        <span class="countdown-number" id="days">0</span>
        <div class="countdown-label">Días</div>
      </div>
      <div class="countdown-unit">
        <span class="countdown-number" id="hours">0</span>
        <div class="countdown-label">Horas</div>
      </div>
      <div class="countdown-unit">
        <span class="countdown-number" id="seconds">0</span>
        <div class="countdown-label">Segundos</div>
      </div>
    </div>
  </div>

  <form id="contactForm">
  <label>Nombre:</label>
  <input type="text" id="name" required>

  <label>Email:</label>
  <input type="email" id="email" required>

  <label>Mensaje:</label>
  <textarea id="message" required></textarea>

  <button type="submit">Enviar</button>
</form>

<p id="status"></p>

<script>
// Countdown timer
function updateCountdown() {
  const now = new Date();
  const target = new Date('2026-08-26T00:00:00').getTime();
  const remaining = target - now.getTime();
  
  if (remaining <= 0) {
    document.getElementById('days').textContent = '0';
    document.getElementById('hours').textContent = '0';
    document.getElementById('seconds').textContent = '0';
    return;
  }
  
  const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
  const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
  
  document.getElementById('days').textContent = days;
  document.getElementById('hours').textContent = hours;
  document.getElementById('seconds').textContent = seconds;
}

// Update countdown immediately and then every second
updateCountdown();
setInterval(updateCountdown, 1000);

// Form submission handler
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    message: document.getElementById("message").value
  };

  const response = await fetch("https://api.github.com/repos/miguelacuna-99/boda-elena/actions/workflows/form.yml/dispatches", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer GITHUB_TOKEN_NO_AQUI"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: payload
    })
  });

  document.getElementById("status").innerText =
    response.ok ? "Mensaje enviado correctamente." : "Error al enviar.";
});
</script>


</html>
